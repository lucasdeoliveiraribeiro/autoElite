<a [routerLink]="['/carro', car.id]" class="car-card">
  <!-- Image -->
  <div class="card-image">
    <img [src]="car.imagem" [alt]="car.marca + ' ' + car.modelo" loading="lazy">
    <div class="card-badges">
      <span *ngIf="car.novo" class="badge badge-new">Novo</span>
      <span *ngIf="car.destaque" class="badge badge-destaque">Destaque</span>
    </div>
    <button class="fav-btn" [class.active]="isFavorite" (click)="toggleFavorite($event)" title="Favoritar">
      <svg width="18" height="18" viewBox="0 0 24 24" [attr.fill]="isFavorite ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
      </svg>
    </button>
    <div class="card-combustivel">{{ car.combustivel }}</div>
  </div>

  <!-- Info -->
  <div class="card-body">
    <div class="card-title-row">
      <div>
        <div class="card-marca">{{ car.marca }}</div>
        <h3 class="card-modelo">{{ car.modelo }}</h3>
        <div class="card-versao">{{ car.versao }}</div>
      </div>
    </div>

    <div class="card-specs">
      <div class="spec">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        {{ formatKm(car.km) }}
      </div>
      <div class="spec">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        {{ car.ano }}
      </div>
      <div class="spec">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        {{ car.cambio }}
      </div>
    </div>

    <div class="card-footer">
      <div class="card-price">
        <div class="price-label">Preço</div>
        <div class="price-value">{{ formatPrice(car.preco) }}</div>
      </div>
      <div class="card-cta">
        Ver detalhes
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </div>
  </div>
</a>
